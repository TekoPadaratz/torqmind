services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: torqmind-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./ch_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ADICIONE ESTAS 2 LINHAS AQUI (respeite o alinhamento do "networks" com o "clickhouse"):
    networks:
      - torqmind_default

# ADICIONE ESTE BLOCO NO FINAL DO ARQUIVO (totalmente encostado na margem esquerda):
networks:
  torqmind_default:
    external: true
    name: torqmind_default