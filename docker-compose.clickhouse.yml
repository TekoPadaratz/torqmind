services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-torqmind_mart}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-torqmind}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-torqmind}
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  chdata:
